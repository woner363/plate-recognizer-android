name: CI

# 在 push/PR 到默认分支时跑：单元测试 + Lint + Debug APK 构建。
# 评审 §3.10 P2：PR 未通过测试或 Lint 时不能合并；APK 由 CI 而非本地构建。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 并发组：同一 ref 上新 push 会取消之前还在跑的运行，节省 CI 时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test + Lint + Assemble (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # PR 不写入 cache（避免 fork 拿到主仓 cache）；push 写入。
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run Android Lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Compute APK SHA256
        id: sha
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          SHA=$(sha256sum "$APK" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "APK SHA256: $SHA"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
          if-no-files-found: ignore
