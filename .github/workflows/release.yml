name: Release

# 推送 v* tag 时触发：干净环境构建 → 计算 SHA256 → 发 GitHub Release（含 APK + SHA256 文件）。
# 评审 §3.10 P2：Release APK 应由 CI 从干净检出环境构建并上传，而不是人工上传本地工作区产物。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 创建/编辑 release + 上传 asset

jobs:
  release:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # §4.1：从 GitHub Secret 还原固定 debug keystore，保证连续 Release 签名一致、可覆盖升级。
      # 之前用 actions/cache 跨 tag 不持久（tag push 触发的 run 写入 cache 不被后续 tag 读到），
      # 改用 Secret 存 base64 keystore——每次 run 从 secret 解码，零 cache 依赖。
      - name: Restore debug keystore from secret
        env:
          CI_DEBUG_KEYSTORE_BASE64: ${{ secrets.CI_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$CI_DEBUG_KEYSTORE_BASE64" ]; then
            echo "::error::Secret CI_DEBUG_KEYSTORE_BASE64 未设置，无法签名"
            exit 1
          fi
          echo "$CI_DEBUG_KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/ci-debug.keystore
          echo "keystore restored, size=$(wc -c < ${{ runner.temp }}/ci-debug.keystore) bytes"

      - name: Run unit tests
        env:
          CI_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/ci-debug.keystore
          CI_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.CI_DEBUG_KEYSTORE_PASSWORD }}
          CI_DEBUG_KEY_ALIAS: ${{ secrets.CI_DEBUG_KEY_ALIAS }}
          CI_DEBUG_KEY_PASSWORD: ${{ secrets.CI_DEBUG_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run Android Lint
        env:
          CI_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/ci-debug.keystore
          CI_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.CI_DEBUG_KEYSTORE_PASSWORD }}
          CI_DEBUG_KEY_ALIAS: ${{ secrets.CI_DEBUG_KEY_ALIAS }}
          CI_DEBUG_KEY_PASSWORD: ${{ secrets.CI_DEBUG_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Assemble debug APK
        env:
          CI_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/ci-debug.keystore
          CI_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.CI_DEBUG_KEYSTORE_PASSWORD }}
          CI_DEBUG_KEY_ALIAS: ${{ secrets.CI_DEBUG_KEY_ALIAS }}
          CI_DEBUG_KEY_PASSWORD: ${{ secrets.CI_DEBUG_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleDebug

      # §4.1：校验签名证书指纹，与预期一致才继续发布。
      - name: Verify signing certificate
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          set -euo pipefail
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          APK=app/build/outputs/apk/debug/app-debug.apk
          # apksigner 输出形如 "Signer #1 certificate SHA-256 digest: <64 hex>"
          # 用 grep -oE 直接抠 64 位十六进制，避免 awk 切分字段时把字段名当值。
          CERT=$("$BUILD_TOOLS/apksigner" verify --print-certs "$APK" \
            | grep -oE '[a-fA-F0-9]{64}' | head -1)
          if [ -z "$CERT" ]; then
            echo "::error::未能从 apksigner 输出提取签名证书指纹"
            exit 1
          fi
          echo "APK signer SHA-256: $CERT"
          # 期望指纹来自 repo variable CI_DEBUG_CERT_SHA256；未设置时跳过比对（首次发布）。
          EXPECTED="${{ vars.CI_DEBUG_CERT_SHA256 }}"
          if [ -n "$EXPECTED" ] && [ "$CERT" != "$EXPECTED" ]; then
            echo "::error::签名证书指纹不匹配（期望 $EXPECTED，实际 $CERT）"
            exit 1
          fi
          echo "cert_sha256=$CERT" >> "$GITHUB_ENV"

      - name: Stage artifacts
        id: stage
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/app-debug.apk
          SHA=$(sha256sum out/app-debug.apk | awk '{print $1}')
          echo "$SHA  app-debug.apk" > out/app-debug.apk.sha256
          {
            echo "## CI 构建信息"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- 构建命令: \`./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug\`"
            echo "- 环境: GitHub Actions \`ubuntu-latest\` · JDK 17 (Temurin) · Gradle Wrapper 8.7"
            echo "- APK SHA256: \`$SHA\`"
            echo "- 签名证书 SHA-256: \`${{ env.cert_sha256 }}\`"
          } > out/ci-notes.md
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 若 release 已存在（你之前手工 gh release create 过）就上传 asset；
          # 否则创建一个新 release（标记 prerelease，notes 自动从 tag message 取）。
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，追加 CI 产物。"
            gh release upload "$TAG" \
              out/app-debug.apk out/app-debug.apk.sha256 out/ci-notes.md \
              --repo "${{ github.repository }}" --clobber
          else
            echo "创建 Release $TAG。"
            gh release create "$TAG" \
              out/app-debug.apk out/app-debug.apk.sha256 out/ci-notes.md \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file out/ci-notes.md \
              --prerelease \
              --target "${{ github.sha }}"
          fi

      - name: Upload APK as workflow artifact (mirror)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.ref_name }}
          path: out/
          retention-days: 90
