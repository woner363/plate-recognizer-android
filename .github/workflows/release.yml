name: Release

# 推送 v* tag 时触发：干净环境构建 → 计算 SHA256 → 发 GitHub Release（含 APK + SHA256 文件）。
# 评审 §3.10 P2：Release APK 应由 CI 从干净检出环境构建并上传，而不是人工上传本地工作区产物。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 创建/编辑 release + 上传 asset

jobs:
  release:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run Android Lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Assemble debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Stage artifacts
        id: stage
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/app-debug.apk
          SHA=$(sha256sum out/app-debug.apk | awk '{print $1}')
          echo "$SHA  app-debug.apk" > out/app-debug.apk.sha256
          {
            echo "## CI 构建信息"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- 构建命令: \`./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug\`"
            echo "- 环境: GitHub Actions \`ubuntu-latest\` · JDK 17 (Temurin) · Gradle Wrapper 8.7"
            echo "- APK SHA256: \`$SHA\`"
          } > out/ci-notes.md
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 若 release 已存在（你之前手工 gh release create 过）就上传 asset；
          # 否则创建一个新 release（标记 prerelease，notes 自动从 tag message 取）。
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，追加 CI 产物。"
            gh release upload "$TAG" \
              out/app-debug.apk out/app-debug.apk.sha256 out/ci-notes.md \
              --repo "${{ github.repository }}" --clobber
          else
            echo "创建 Release $TAG。"
            gh release create "$TAG" \
              out/app-debug.apk out/app-debug.apk.sha256 out/ci-notes.md \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file out/ci-notes.md \
              --prerelease \
              --target "${{ github.sha }}"
          fi

      - name: Upload APK as workflow artifact (mirror)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.ref_name }}
          path: out/
          retention-days: 90
