name: Release

# 推送 v* tag 时触发：干净环境构建 → 计算 SHA256 → 发 GitHub Release（含 APK + SHA256 文件）。
# 评审 §3.10 P2：Release APK 应由 CI 从干净检出环境构建并上传，而不是人工上传本地工作区产物。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 创建/编辑 release + 上传 asset

jobs:
  release:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # §4.1：固定 debug keystore，让连续 Release 签名一致、可覆盖升级。
      # 首次运行生成，之后从 cache 恢复。cache key 固定，需要轮换时 bump 到 v2。
      - name: Restore debug keystore
        id: keystore
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ci-debug.keystore
          key: ci-debug-keystore-v1

      - name: Generate debug keystore if missing
        if: steps.keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore ${{ runner.temp }}/ci-debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Plate Recognizer CI Debug, O=CI, C=US"

      - name: Run unit tests
        env:
          CI_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/ci-debug.keystore
          CI_DEBUG_KEYSTORE_PASSWORD: android
          CI_DEBUG_KEY_ALIAS: androiddebugkey
          CI_DEBUG_KEY_PASSWORD: android
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Run Android Lint
        env:
          CI_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/ci-debug.keystore
          CI_DEBUG_KEYSTORE_PASSWORD: android
          CI_DEBUG_KEY_ALIAS: androiddebugkey
          CI_DEBUG_KEY_PASSWORD: android
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Assemble debug APK
        env:
          CI_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/ci-debug.keystore
          CI_DEBUG_KEYSTORE_PASSWORD: android
          CI_DEBUG_KEY_ALIAS: androiddebugkey
          CI_DEBUG_KEY_PASSWORD: android
        run: ./gradlew --no-daemon :app:assembleDebug

      # §4.1：校验签名证书指纹，与预期一致才继续发布。
      - name: Verify signing certificate
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          set -euo pipefail
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          APK=app/build/outputs/apk/debug/app-debug.apk
          CERT=$("$BUILD_TOOLS/apksigner" verify --print-certs "$APK" \
            | grep "SHA-256 digest" | head -1 | awk -F: '{print $2}' | tr -d ' ')
          echo "APK signer SHA-256: $CERT"
          # 期望指纹写在这里；首次 Release 后填入实际值，后续变更会触发失败。
          EXPECTED="${{ vars.CI_DEBUG_CERT_SHA256 }}"
          if [ -n "$EXPECTED" ] && [ "$CERT" != "$EXPECTED" ]; then
            echo "::error::签名证书指纹不匹配（期望 $EXPECTED，实际 $CERT）"
            exit 1
          fi
          echo "cert_sha256=$CERT" >> "$GITHUB_ENV"

      - name: Stage artifacts
        id: stage
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/app-debug.apk
          SHA=$(sha256sum out/app-debug.apk | awk '{print $1}')
          echo "$SHA  app-debug.apk" > out/app-debug.apk.sha256
          {
            echo "## CI 构建信息"
            echo
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- 构建命令: \`./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug\`"
            echo "- 环境: GitHub Actions \`ubuntu-latest\` · JDK 17 (Temurin) · Gradle Wrapper 8.7"
            echo "- APK SHA256: \`$SHA\`"
            echo "- 签名证书 SHA-256: \`${{ env.cert_sha256 }}\`"
          } > out/ci-notes.md
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # 若 release 已存在（你之前手工 gh release create 过）就上传 asset；
          # 否则创建一个新 release（标记 prerelease，notes 自动从 tag message 取）。
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，追加 CI 产物。"
            gh release upload "$TAG" \
              out/app-debug.apk out/app-debug.apk.sha256 out/ci-notes.md \
              --repo "${{ github.repository }}" --clobber
          else
            echo "创建 Release $TAG。"
            gh release create "$TAG" \
              out/app-debug.apk out/app-debug.apk.sha256 out/ci-notes.md \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file out/ci-notes.md \
              --prerelease \
              --target "${{ github.sha }}"
          fi

      - name: Upload APK as workflow artifact (mirror)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.ref_name }}
          path: out/
          retention-days: 90
